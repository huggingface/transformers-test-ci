name: PR CI Security Gate

on:
  workflow_call:

permissions:
  contents: read
  actions: write
  pull-requests: write

jobs:
  security-check:
    runs-on: ubuntu-22.04
    steps:
      - name: Get changed files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Save full API response (includes patches) and extract non-deleted filenames
          gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" | jq -s 'add' > /tmp/pr_files.json
          jq -r '.[] | select(.status != "removed") | .filename' /tmp/pr_files.json > /tmp/changed_files.txt
          echo "Changed files:"
          cat /tmp/changed_files.txt
          grep '\.py$' /tmp/changed_files.txt > /tmp/py_files.txt || true

      - name: Enforce allowlist — only src/tests/docs/utils, only .py/.txt/.md
        run: |
          failed=0
          while IFS= read -r file; do
            # Rule 1: file must be inside one of the four allowed top-level directories
            if ! echo "$file" | grep -qE '^(src|tests|docs|utils)/'; then
              echo "::error::File is outside allowed directories (src, tests, docs, utils): $file"
              failed=1
            # Rule 2: under tests/ any file type is allowed; everywhere else only .py/.txt/.md
            elif ! echo "$file" | grep -qE '^tests/' && ! echo "$file" | grep -qE '\.(py|txt|md)$'; then
              echo "::error::File type not allowed (only .py, .txt, .md permitted outside tests/): $file"
              failed=1
            fi
          done < /tmp/changed_files.txt
          [ "$failed" -eq 0 ] || exit 1

      - name: Check if Python files changed
        id: py-check
        run: |
          if [ -s /tmp/py_files.txt ]; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "No Python files changed — skipping Bandit"
            echo "has_py=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR code for static analysis
        if: steps.py-check.outputs.has_py == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run Bandit on changed Python files
        if: steps.py-check.outputs.has_py == 'true'
        run: |
          pip install bandit --quiet
          # -d '\n': split on newlines only (handles filenames with spaces)
          # --: end of options, prevents filenames starting with '-' being treated as flags
          xargs -d '\n' bandit --format json -l --ignore-nosec -o /tmp/bandit_report.json -- < /tmp/py_files.txt || true

      - name: Check for new high severity issues
        if: steps.py-check.outputs.has_py == 'true'
        run: |
          python3 - <<'EOF'
          import json, os, re, sys

          if not os.path.exists('/tmp/bandit_report.json'):
              print("::error::Bandit report not found — Bandit may have crashed before writing output")
              sys.exit(1)

          with open('/tmp/bandit_report.json') as f:
              try:
                  report = json.load(f)
              except json.JSONDecodeError as e:
                  print(f"::error::Failed to parse Bandit report: {e}")
                  sys.exit(1)
          with open('/tmp/pr_files.json') as f:
              pr_files = json.load(f)

          SHELL_TESTS = re.compile(r'^B60[1-79]$')

          findings = [
              r for r in report.get('results', [])
              if r['issue_severity'] == 'HIGH' or SHELL_TESTS.match(r['test_id'])
          ]
          if not findings:
              print("No issues found")
              sys.exit(0)

          def added_lines(patch):
              """Return set of line numbers (in the new file) that were added by the PR."""
              added = set()
              current_line = 0
              for line in (patch or '').split('\n'):
                  if line.startswith('@@'):
                      m = re.search(r'\+(\d+)(?:,\d+)?', line)
                      if m:
                          current_line = int(m.group(1))
                  elif line.startswith('+') and not line.startswith('+++'):
                      added.add(current_line)
                      current_line += 1
                  elif not line.startswith('-'):
                      current_line += 1
              return added

          patch_map = {f['filename']: f.get('patch') for f in pr_files}

          new_issues = []
          for finding in findings:
              # Bandit reports './path/to/file.py', API returns 'path/to/file.py'
              filename = finding['filename'].lstrip('./')
              patch = patch_map.get(filename)
              if patch is None:
                  # Patch truncated (large file) — treat conservatively as new issue
                  new_issues.append(finding)
              elif finding['line_number'] in added_lines(patch):
                  new_issues.append(finding)

          if new_issues:
              print(f"::error::Found {len(new_issues)} issue(s) introduced by this PR:")
              for i in new_issues:
                  print(f"  {i['filename']}:{i['line_number']} [{i['test_id']}] [{i['issue_severity']}] {i['issue_text']}")
              sys.exit(1)

          print(f"Issues found in {len(findings)} location(s) but all pre-existing — OK")
          EOF

      - name: Post failure comment on PR
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Delete any previous security gate failure comment to avoid duplicates
          comment_id=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("CI Security Gate — automatic approval blocked")) | .id' \
            | head -1)
          if [ -n "$comment_id" ]; then
            gh api --method DELETE "repos/$REPO/issues/comments/$comment_id"
          fi

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "Thank you for your contribution 🤗!

          ## CI Security Gate — automatic approval blocked

          This PR was **not** automatically approved for CI because the security gate failed.

          **Possible reasons:**
          - A changed file is outside the allowed directories (\`src/\`, \`tests/\`, \`docs/\`, \`utils/\`) or has a disallowed extension (only \`.py\`, \`.txt\`, \`.md\` are permitted outside \`tests/\`)
          - A new high-severity security issue was detected in the changed Python files (Bandit check)

          See the [workflow run]($RUN_URL) for the exact violations.

          A maintainer can review and manually approve CI if a finding is a false positive."

  approve-pr-ci:
    needs: security-check
    runs-on: ubuntu-22.04
    steps:
      - name: Find and approve the pending PR CI workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          for i in $(seq 1 12); do
            run_id=$(gh api \
              "repos/$REPO/actions/runs?event=pull_request&head_sha=$HEAD_SHA&status=action_required" \
              --jq '.workflow_runs[] | select(.name == "PR CI") | .id' | head -1)
            if [ -n "$run_id" ]; then
              gh api --method POST "repos/$REPO/actions/runs/$run_id/approve"
              echo "Approved run $run_id"
              exit 0
            fi
            echo "Attempt $i: run not yet pending, retrying in 5s..."
            sleep 5
          done
          echo "No pending PR CI run found after retries — skipping"
