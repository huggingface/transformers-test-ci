# =============================================================================
# .github/workflows/pr-ci_dynamic_caller_example.yml
#
# Caller workflow — equivalent of create_circleci_config.py's
# create_circleci_config() function + the CircleCI continuation trigger.
#
# Structure:
#   1. test-preparation  →  runs tests_fetcher, uploads {job_name}_test_list
#                           artifacts (replaces CircleCI workspace + pipeline
#                           parameters).
#   2. Per-job calls     →  one `uses:` block per CircleCIJob instance,
#                           each mapping its fields to reusable_test_job inputs.
#                           Each job is gated on whether its test-list artifact
#                           is non-empty (mirrors the
#                           `os.path.isfile(f"{job_name}_test_list.txt")` check
#                           in create_circleci_config()).
#   3. collection        →  waits for all test jobs, aggregates reports
#                           (replaces EmptyJob / collection_job).
# =============================================================================

name: CI — Dynamic Test Suite

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 2 * * *"   # nightly
  workflow_dispatch:
    inputs:
      nightly:
        description: "Run as nightly (enables flaky tests)"
        type: boolean
        default: false

jobs:
  # ===========================================================================
  # Stage 1 — Test preparation
  # Equivalent of the CircleCI "setup" workflow that calls the continuation API.
  # Runs tests_fetcher to produce per-job test list files, then uploads each
  # as a named artifact consumed by the reusable workflow.
  # ===========================================================================
  test-preparation:
    name: "Test preparation (fetcher)"
    runs-on: ubuntu-22.04
    container:
      image: huggingface/transformers-quality
    outputs:
      # Expose which jobs have a non-empty test list (mirrors the
      # `os.path.isfile(f"{job_name}_test_list.txt")` gate in create_circleci_config)
      run_tests_torch:           ${{ steps.check.outputs.run_tests_torch }}
      run_tests_generate:        ${{ steps.check.outputs.run_tests_generate }}
      run_tests_tokenization:    ${{ steps.check.outputs.run_tests_tokenization }}
      run_tests_processors:      ${{ steps.check.outputs.run_tests_processors }}
      run_pipelines_torch:       ${{ steps.check.outputs.run_pipelines_torch }}
      run_tests_custom_tokenizers: ${{ steps.check.outputs.run_tests_custom_tokenizers }}
      run_examples_torch:        ${{ steps.check.outputs.run_examples_torch }}
      run_tests_exotic_models:   ${{ steps.check.outputs.run_tests_exotic_models }}
      run_tests_repo_utils:      ${{ steps.check.outputs.run_tests_repo_utils }}
      run_tests_non_model:       ${{ steps.check.outputs.run_tests_non_model }}
      run_tests_training_ci:     ${{ steps.check.outputs.run_tests_training_ci }}
      # Mirrors CircleCIJob.__post_init__: appends ':dev' when the commit
      # message contains "[build-ci-image]" or equals "dev-ci".
      use_dev_image:             ${{ steps.dev_image.outputs.use_dev_image }}
    steps:
      - uses: actions/checkout@v4
        with:
          # full clone - very slow! But we need this to compute the set of files to run.
          # TODO: Check if CircleCI is doing the same.
          fetch-depth: 0



      - name: Debug
        run: |
          uv pip install -U -e .
          echo $(pwd)
          ls -la
          # We need this, otherwise `tests_fetcher.py` below will fail with `SHA could not be resolved, git returned: b''` when access ``repo.head.commit`.
          # (even git log -n X will fail without this command)
          git config --global --add safe.directory '*'
          git log -n 5

      # tests_fetcher.py computes which tests to run by diffing the current
      # branch against main, so main must exist locally as a git ref.
      - name: Fetch main branch ref
        run: git fetch origin main:main

      # Mirrors CircleCIJob.__post_init__ in create_circleci_config.py:
      #   if "[build-ci-image]" in GIT_COMMIT_MESSAGE or GIT_COMMIT_MESSAGE == "dev-ci":
      #       docker_image += ":dev"
      # In CircleCI this was set via $BASH_ENV; here we emit a job output
      # consumed by each per-job `uses:` block as the `use_dev_image` input.
      - name: Detect dev image flag from commit message
        id: dev_image
        run: |
          MSG=$(git show -s --format=%s)
          echo "Commit message subject: $MSG"
          if echo "$MSG" | grep -qF "[build-ci-image]" || [ "$MSG" = "dev-ci" ]; then
            echo "use_dev_image=true" >> $GITHUB_OUTPUT
          else
            echo "use_dev_image=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests fetcher
        run: |
          uv pip install -U -e .
          mkdir -p test_preparation
          python utils/tests_fetcher.py | tee tests_fetched_summary.txt || true
          python utils/tests_fetcher.py --filter_tests || true

      - name: Check which jobs have tests to run
        id: check
        run: |
          for job in tests_torch tests_generate tests_tokenization tests_processors \
                     pipelines_torch tests_custom_tokenizers examples_torch \
                     tests_exotic_models tests_repo_utils tests_non_model \
                     tests_training_ci; do
            FILE="test_preparation/${job}_test_list.txt"
            if [ -f "$FILE" ] && [ -s "$FILE" ]; then
              echo "run_${job}=true" >> $GITHUB_OUTPUT
            else
              echo "run_${job}=false" >> $GITHUB_OUTPUT
            fi
          done

      - name: Debug — print test list file sizes
        run: |
          for job in tests_torch tests_generate tests_tokenization tests_processors \
                     pipelines_torch tests_custom_tokenizers examples_torch \
                     tests_exotic_models tests_repo_utils tests_non_model \
                     tests_training_ci; do
            FILE="test_preparation/${job}_test_list.txt"
            if [ -f "$FILE" ]; then
              echo "$FILE: $(grep -c '' "$FILE") lines"
            else
              echo "$FILE: not found"
            fi
          done

      # Upload a single artifact containing all {job_name}_test_list.txt files
      # (replaces CircleCI pipeline parameters + workspace). Each reusable job
      # downloads this artifact and reads its own file by job_name.
      - name: Upload test list artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-preparation
          path: test_preparation/
          retention-days: 3

  # ===========================================================================
  # Stage 2 — Test jobs
  # One `uses:` block per CircleCIJob instance.
  # Each block is a 1:1 mapping of CircleCIJob constructor arguments.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # torch_job = CircleCIJob(
  #     "torch",
  #     docker_image=[{"image": "huggingface/transformers-torch-light"}],
  #     marker="not generate",
  #     parallelism=6,
  # )
  # ---------------------------------------------------------------------------
  tests_torch:
    needs: test-preparation
    if: needs.test-preparation.outputs.run_tests_torch == 'true'
    uses: ./.github/workflows/pr-ci_reusable_test_job.yml
    with:
      job_name:          "tests_torch"
      docker_image:      "huggingface/transformers-torch-light"
      parallelism:       6
      marker:            "not generate"
      use_dev_image:     ${{ needs.test-preparation.outputs.use_dev_image == 'true' }}
      # install_steps, pytest_num_workers, etc. → all defaults






  # ---------------------------------------------------------------------------
  # generate_job = CircleCIJob(
  #     "generate",
  #     docker_image=[{"image": "huggingface/transformers-torch-light"}],
  #     install_steps=["uv pip install ."],
  #     marker="generate",
  #     parallelism=6,
  # )
  # ---------------------------------------------------------------------------
  tests_generate:
    needs: test-preparation
    if: needs.test-preparation.outputs.run_tests_generate == 'true'
    uses: ./.github/workflows/pr-ci_reusable_test_job.yml
    with:
      job_name:          "tests_generate"
      docker_image:      "huggingface/transformers-torch-light"
      parallelism:       6
      marker:            "generate"
      install_steps:     "uv pip install ."
      use_dev_image:     ${{ needs.test-preparation.outputs.use_dev_image == 'true' }}

  # ---------------------------------------------------------------------------
  # tokenization_job = CircleCIJob(
  #     "tokenization",
  #     docker_image=[{"image": "huggingface/transformers-torch-light"}],
  #     parallelism=8,
  # )
  # ---------------------------------------------------------------------------
  tests_tokenization:
    needs: test-preparation
    if: needs.test-preparation.outputs.run_tests_tokenization == 'true'
    uses: ./.github/workflows/pr-ci_reusable_test_job.yml
    with:
      job_name:          "tests_tokenization"
      docker_image:      "huggingface/transformers-torch-light"
      parallelism:       8
      use_dev_image:     ${{ needs.test-preparation.outputs.use_dev_image == 'true' }}

  # ---------------------------------------------------------------------------
  # processor_job = CircleCIJob(
  #     "processors",
  #     docker_image=[{"image": "huggingface/transformers-torch-light"}],
  #     parallelism=8,
  # )
  # ---------------------------------------------------------------------------
  tests_processors:
    needs: test-preparation
    if: needs.test-preparation.outputs.run_tests_processors == 'true'
    uses: ./.github/workflows/pr-ci_reusable_test_job.yml
    with:
      job_name:          "tests_processors"
      docker_image:      "huggingface/transformers-torch-light"
      parallelism:       8
      use_dev_image:     ${{ needs.test-preparation.outputs.use_dev_image == 'true' }}

  # ---------------------------------------------------------------------------
  # pipelines_torch_job = CircleCIJob(
  #     "pipelines_torch",
  #     additional_env={"RUN_PIPELINE_TESTS": True},
  #     docker_image=[{"image":"huggingface/transformers-torch-light"}],
  #     marker="is_pipeline_test",
  #     parallelism=4,
  # )
  # NOTE: job_name="pipelines_torch" (no tests_ prefix, "pipeline" in name).
  # NOTE: report_name must be set explicitly → "tests_pipelines_torch"
  #       (mirrors `--make-reports=tests_{self.name}` since "examples" not in name).
  # ---------------------------------------------------------------------------
  pipelines_torch:
    needs: test-preparation
    if: needs.test-preparation.outputs.run_pipelines_torch == 'true'
    uses: ./.github/workflows/pr-ci_reusable_test_job.yml
    with:
      job_name:            "pipelines_torch"
      report_name:         "tests_pipelines_torch"
      docker_image:        "huggingface/transformers-torch-light"
      parallelism:         4
      marker:              "is_pipeline_test"
      run_pipeline_tests:  true
      use_dev_image:       ${{ needs.test-preparation.outputs.use_dev_image == 'true' }}

  # ---------------------------------------------------------------------------
  # custom_tokenizers_job = CircleCIJob(
  #     "custom_tokenizers",
  #     additional_env={"RUN_CUSTOM_TOKENIZERS": True},
  #     docker_image=[{"image": "huggingface/transformers-custom-tokenizers"}],
  # )
  # parallelism=0 (default) → single shard
  # ---------------------------------------------------------------------------
  tests_custom_tokenizers:
    needs: test-preparation
    if: needs.test-preparation.outputs.run_tests_custom_tokenizers == 'true'
    uses: ./.github/workflows/pr-ci_reusable_test_job.yml
    with:
      job_name:               "tests_custom_tokenizers"
      docker_image:           "huggingface/transformers-custom-tokenizers"
      run_custom_tokenizers:  true
      use_dev_image:          ${{ needs.test-preparation.outputs.use_dev_image == 'true' }}

  # ---------------------------------------------------------------------------
  # examples_torch_job = CircleCIJob(
  #     "examples_torch",
  #     additional_env={"OMP_NUM_THREADS": 8},
  #     docker_image=[{"image":"huggingface/transformers-examples-torch"}],
  #     install_steps=["uv pip install . && uv pip install -r examples/pytorch/_tests_requirements.txt"],
  #     pytest_num_workers=4,
  # )
  # job_name="examples_torch" (no tests_ prefix, "examples" in name).
  # ---------------------------------------------------------------------------
  examples_torch:
    needs: test-preparation
    if: needs.test-preparation.outputs.run_examples_torch == 'true'
    uses: ./.github/workflows/pr-ci_reusable_test_job.yml
    with:
      job_name:           "examples_torch"
      docker_image:       "huggingface/transformers-examples-torch"
      install_steps:      "uv pip install . && uv pip install -r examples/pytorch/_tests_requirements.txt"
      pytest_num_workers: 4
      omp_num_threads:    8
      use_dev_image:      ${{ needs.test-preparation.outputs.use_dev_image == 'true' }}

  # ---------------------------------------------------------------------------
  # exotic_models_job = CircleCIJob(
  #     "exotic_models",
  #     docker_image=[{"image":"huggingface/transformers-exotic-models"}],
  #     parallelism=4,
  #     pytest_options={"durations": 100},
  # )
  # ---------------------------------------------------------------------------
  tests_exotic_models:
    needs: test-preparation
    if: needs.test-preparation.outputs.run_tests_exotic_models == 'true'
    uses: ./.github/workflows/pr-ci_reusable_test_job.yml
    with:
      job_name:              "tests_exotic_models"
      docker_image:          "huggingface/transformers-exotic-models"
      parallelism:           4
      pytest_extra_options:  "--durations=100"
      use_dev_image:         ${{ needs.test-preparation.outputs.use_dev_image == 'true' }}

  # ---------------------------------------------------------------------------
  # repo_utils_job = CircleCIJob(
  #     "repo_utils",
  #     docker_image=[{"image":"huggingface/transformers-consistency"}],
  #     pytest_num_workers=4,
  # )
  # ---------------------------------------------------------------------------
  tests_repo_utils:
    needs: test-preparation
    if: needs.test-preparation.outputs.run_tests_repo_utils == 'true'
    uses: ./.github/workflows/pr-ci_reusable_test_job.yml
    with:
      job_name:           "tests_repo_utils"
      docker_image:       "huggingface/transformers-consistency"
      pytest_num_workers: 4
      use_dev_image:      ${{ needs.test-preparation.outputs.use_dev_image == 'true' }}
      skip_hub_cache:     true

  # ---------------------------------------------------------------------------
  # non_model_job = CircleCIJob(
  #     "non_model",
  #     docker_image=[{"image": "huggingface/transformers-torch-light"}],
  #     install_steps=["uv pip install .[serving]"],
  #     marker="not generate",
  #     parallelism=6,
  # )
  # ---------------------------------------------------------------------------
  tests_non_model:
    needs: test-preparation
    if: needs.test-preparation.outputs.run_tests_non_model == 'true'
    uses: ./.github/workflows/pr-ci_reusable_test_job.yml
    with:
      job_name:          "tests_non_model"
      docker_image:      "huggingface/transformers-torch-light"
      parallelism:       6
      install_steps:     "uv pip install .[serving]"
      marker:            "not generate"
      use_dev_image:     ${{ needs.test-preparation.outputs.use_dev_image == 'true' }}

  # ---------------------------------------------------------------------------
  # training_ci_job = CircleCIJob(
  #     "training_ci",
  #     additional_env={"RUN_TRAINING_TESTS": True},
  #     docker_image=[{"image": "huggingface/transformers-torch-light"}],
  #     install_steps=["uv pip install ."],
  #     marker="is_training_test",
  #     parallelism=6,
  # )
  # ---------------------------------------------------------------------------
  tests_training_ci:
    needs: test-preparation
    if: needs.test-preparation.outputs.run_tests_training_ci == 'true'
    uses: ./.github/workflows/pr-ci_reusable_test_job.yml
    with:
      job_name:            "tests_training_ci"
      docker_image:        "huggingface/transformers-torch-light"
      parallelism:         6
      install_steps:       "uv pip install ."
      marker:              "is_training_test"
      run_training_tests:  true
      use_dev_image:       ${{ needs.test-preparation.outputs.use_dev_image == 'true' }}

  # ---------------------------------------------------------------------------
  # ===========================================================================
  # Stage 3 — Collection (equivalent of EmptyJob with job_name="collection_job")
  # Waits for all test jobs, aggregates test reports.
  # Mirrors: poll CircleCI workflow API + process_circleci_workflow_test_reports.py
  # ===========================================================================
  collection:
    name: "Collect and aggregate test results"
    runs-on: ubuntu-22.04
    # Wait for all test jobs regardless of their outcome.
    needs:
      - tests_torch
      - tests_generate
      - tests_tokenization
      - tests_processors
      - pipelines_torch
      - tests_custom_tokenizers
      - examples_torch
      - tests_exotic_models
      - tests_repo_utils
      - tests_non_model
      - tests_training_ci
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: outputs/

      - name: Aggregate test reports
        # Equivalent of process_circleci_workflow_test_reports.py
        # Script path updated: .circleci/ → utils/ (or wherever it lives in GHA)
        run: python3 utils/process_circleci_workflow_test_reports.py || true

      - name: Upload aggregated results
        uses: actions/upload-artifact@v4
        with:
          name: aggregated-test-results
          path: outputs/
          retention-days: 30
