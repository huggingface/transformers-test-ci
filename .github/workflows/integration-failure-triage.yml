name: Integration-failure triage (daily Serge auto-fix)

# Once a day at 00:00 UTC: compute the integration-test failure triage report
# from the daily CI dataset, then ask Serge to open a PR fixing one of the
# ordered failure groups. The Markdown report is kept as a build artifact.
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - tarek-nightly-bot
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Compute the report but do not dispatch to Serge"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # required to mint the GitHub Actions OIDC token for Serge

jobs:
  triage:
    # Serge is internal, so the job joins Tailscale before dispatching.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install "huggingface_hub>=0.25"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID_AI_REVIEW }}
          oauth-secret: ${{ secrets.TS_AUDIENCE_AI_REVIEW }}
          tags: tag:ci
          args: --accept-dns=false

      - name: Mint Serge OIDC token
        id: oidc
        run: |
          set -euo pipefail
          TOKEN=$(curl -sS --fail \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=serge" | jq -r .value)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::failed to mint OIDC token" >&2
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Compute triage report and dispatch to Serge
        run: |
          python utils/integration_failure_triage.py \
            --repo "$GITHUB_REPOSITORY" \
            --base-ref main \
            --serge-url "$SERGE_URL" \
            --serge-timeout "$SERGE_TIMEOUT" \
            --report-out triage-report.md \
            $DRY_RUN_ARG
        env:
          SERGE_URL: ${{ vars.SERGE_URL || 'http://10.90.52.50:8080' }}
          SERGE_TIMEOUT: ${{ vars.SERGE_TIMEOUT || '240' }}
          SERGE_OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
          DRY_RUN_ARG: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}

      - name: Upload triage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-failure-triage-report
          path: triage-report.md
          retention-days: 90
          if-no-files-found: warn
